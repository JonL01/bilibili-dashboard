<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B站数据看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
  background: #0a0a0f;
  color: #e0e0e0;
  min-height: 100vh;
}
.header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  padding: 24px 32px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.header h1 {
  font-size: 24px;
  font-weight: 700;
  background: linear-gradient(90deg, #fb7299, #00a1d6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header .subtitle { font-size: 13px; color: #888; }
.header .subtitle span { color: #fb7299; -webkit-text-fill-color: #fb7299; }
.header-right { display: flex; align-items: center; gap: 12px; }
.header-right .status {
  font-size: 12px;
  color: #4ade80;
  display: flex; align-items: center; gap: 6px;
}
.header-right .status .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #4ade80; display: inline-block;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.header-right button {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  color: #ccc;
  padding: 7px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
}
.header-right button:hover { background: rgba(255,255,255,0.15); color: #fff; }
.stats-bar {
  display: flex;
  gap: 16px;
  padding: 16px 32px;
  background: rgba(255,255,255,0.02);
  border-bottom: 1px solid rgba(255,255,255,0.04);
  flex-wrap: wrap;
}
.stat-item {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: #999;
}
.stat-item .num {
  color: #fff; font-weight: 600; font-size: 16px;
}
.tabs {
  display: flex;
  gap: 4px;
  padding: 16px 32px 0;
  background: rgba(255,255,255,0.01);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  overflow-x: auto;
}
.tab {
  padding: 10px 20px;
  cursor: pointer;
  font-size: 14px;
  color: #888;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
  user-select: none;
}
.tab:hover { color: #ccc; }
.tab.active {
  color: #fff;
  border-bottom-color: #fb7299;
  font-weight: 600;
}
.tab .badge {
  display: inline-block;
  background: rgba(251,114,153,0.2);
  color: #fb7299;
  font-size: 11px;
  padding: 0 6px;
  border-radius: 10px;
  margin-left: 5px;
  font-weight: 400;
}
.content { padding: 20px 32px; max-width: 1400px; margin: 0 auto; }
.tab-content { display: none; }
.tab-content.active { display: block; }

.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  gap: 14px;
}
.video-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 14px 16px;
  transition: all 0.2s;
  cursor: pointer;
}
.video-card:hover {
  background: rgba(255,255,255,0.06);
  border-color: rgba(251,114,153,0.3);
  transform: translateY(-1px);
}
.video-card .rank {
  display: inline-block;
  width: 24px; height: 24px;
  line-height: 24px;
  text-align: center;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 700;
  margin-right: 8px;
  flex-shrink: 0;
}
.rank-1 { background: #fb7299; color: #fff; }
.rank-2 { background: #f59e0b; color: #fff; }
.rank-3 { background: #6366f1; color: #fff; }
.rank-n { background: rgba(255,255,255,0.08); color: #999; }

.video-card .title {
  font-size: 14px;
  font-weight: 600;
  color: #eee;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 8px;
}
.video-card .meta {
  font-size: 12px;
  color: #777;
  display: flex;
  flex-wrap: wrap;
  gap: 4px 16px;
}
.video-card .meta span { display: inline-flex; align-items: center; gap: 4px; }
.video-card .meta .author { color: #00a1d6; }
.video-card .stats-row {
  display: flex;
  gap: 12px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.video-card .stats-row .stat {
  font-size: 11px;
  color: #999;
  display: flex; align-items: center; gap: 3px;
}
.video-card .stats-row .stat .val {
  color: #ddd;
  font-weight: 600;
}
.tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 4px; }
.tag-hot { background: rgba(239,68,68,0.2); color: #f87171; }
.tag-new { background: rgba(34,197,94,0.2); color: #4ade80; }
.tag-soar { background: rgba(251,114,153,0.2); color: #fb7299; }
.tag-rank { background: rgba(99,102,241,0.2); color: #818cf8; }
.tag-mil { background: rgba(250,204,21,0.2); color: #facc15; }
.video-card .time { font-size: 11px; color: #666; margin-top: 4px; }
.video-card .reason { font-size: 11px; color: #fb7299; margin-top: 4px; }

/* Table view for full data */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.data-table th {
  text-align: left;
  padding: 10px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  color: #999;
  font-weight: 500;
  font-size: 12px;
  white-space: nowrap;
}
.data-table td {
  padding: 10px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  white-space: nowrap;
}
.data-table tr:hover td { background: rgba(255,255,255,0.02); }
.data-table .cell-title {
  max-width: 300px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: #eee;
}
.data-table .cell-author { color: #00a1d6; }
.data-table .num-cell { font-variant-numeric: tabular-nums; text-align: right; }

.chart-container {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 24px;
  margin-top: 12px;
}
.chart-container h3 { font-size: 16px; margin-bottom: 16px; color: #ccc; }
.chart-wrap { max-width: 900px; height: 400px; }

.loading {
  text-align: center;
  padding: 60px;
  color: #666;
}
.loading .spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(255,255,255,0.06);
  border-top-color: #fb7299;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-msg {
  text-align: center; padding: 40px; color: #f87171;
}
.error-msg .icon { font-size: 40px; margin-bottom: 12px; }

.view-switch {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.view-switch button {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  color: #888;
  padding: 5px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
}
.view-switch button.active {
  background: rgba(251,114,153,0.15);
  border-color: rgba(251,114,153,0.3);
  color: #fb7299;
}

/* responsive */
@media (max-width: 768px) {
  .header { padding: 16px; }
  .stats-bar { padding: 12px 16px; gap: 10px; }
  .tabs { padding: 12px 16px 0; }
  .content { padding: 12px 16px; }
  .video-grid { grid-template-columns: 1fr; }
  .data-table { font-size: 12px; }
  .data-table .cell-title { max-width: 120px; }
  .data-table th, .data-table td { padding: 6px 8px; }
}

/* tooltip */
.tooltip { position: relative; }
.tooltip:hover::after {
  content: attr(data-tip);
  position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
  background: #222; color: #eee; padding: 4px 8px; border-radius: 4px;
  font-size: 11px; white-space: nowrap; z-index: 10;
}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>📺 B站数据看板</h1>
    <div class="subtitle">实时分析 <span>综合热门</span> · 3 页聚合 · 150+ 视频</div>
  </div>
  <div class="header-right">
    <div class="status"><span class="dot"></span><span id="status-text">空闲</span></div>
    <button onclick="refresh()">🔄 刷新数据</button>
  </div>
</div>

<div class="stats-bar" id="stats-bar">
  <div class="stat-item">共 <span class="num" id="total-count">-</span> 条视频</div>
  <div class="stat-item">🔥 高热 <span class="num" id="hot-count">-</span></div>
  <div class="stat-item">📈 飙升 <span class="num" id="soar-count">-</span></div>
  <div class="stat-item">🆕 新热 <span class="num" id="new-count">-</span></div>
  <div class="stat-item">📊 分区 <span class="num" id="cat-count">-</span></div>
  <div class="stat-item" style="color:#666;">更新于 <span id="update-time">-</span></div>
</div>

<div class="tabs" id="tabs">
  <div class="tab active" data-tab="hot">🔥 高热排行</div>
  <div class="tab" data-tab="soaring">📈 飙升趋势 <span class="badge" id="soar-badge">0</span></div>
  <div class="tab" data-tab="new">🆕 新热速递</div>
  <div class="tab" data-tab="distribution">📊 分区分布</div>
  <div class="tab" data-tab="insights">🧠 热点解读</div>
</div>

<div class="content" id="content">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>正在抓取 B站 综合热门数据（3页150条）...</div>
  </div>
</div>

<script>
let chartInstance = null;
let currentData = null;

function formatNum(n) {
  if (n >= 10000) return (n / 10000).toFixed(n >= 100000 ? 0 : 1) + '万';
  return n.toLocaleString();
}

function timeAgo(ts) {
  const diff = Date.now()/1000 - ts;
  if (diff < 60) return '刚刚';
  if (diff < 3600) return Math.floor(diff/60) + '分钟前';
  if (diff < 86400) return Math.floor(diff/3600) + '小时前';
  const d = Math.floor(diff/86400);
  return d + '天前';
}

function getTag(item) {
  const tags = [];
  const r = (item.rcmd_reason || '').toLowerCase();
  if (r.includes('全站排行') || item.his_rank > 0 && item.his_rank <= 10) tags.push({ cls: 'tag-rank', label: item.his_rank ? `#${item.his_rank}` : '排行' });
  if (r.includes('飙升')) tags.push({ cls: 'tag-soar', label: '飙升' });
  if (r.includes('百万')) tags.push({ cls: 'tag-mil', label: '百万播放' });
  if (r.includes('新')) tags.push({ cls: 'tag-new', label: '新' });
  if (item.age_hours < 6) tags.push({ cls: 'tag-new', label: '极新' });
  return tags.map(t => `<span class="tag ${t.cls}">${t.label}</span>`).join('');
}

function getRankClass(i) {
  if (i === 0) return 'rank-1';
  if (i === 1) return 'rank-2';
  if (i === 2) return 'rank-3';
  return 'rank-n';
}

function renderCards(list, start=1) {
  return list.map((item, i) => {
    const ri = start + i;
    const tags = getTag(item);
    const pub = new Date(item.pubdate * 1000);
    const timeStr = pub.toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
    return `<div class="video-card" onclick="window.open('${item.link}','_blank')">
      <div style="display:flex;align-items:flex-start;gap:8px;">
        <div class="rank ${getRankClass(i)}">${ri}</div>
        <div style="flex:1;min-width:0;">
          <div class="title">${item.title}</div>
          <div class="meta">
            <span class="author">👤 ${item.author}</span>
            <span>🏷️ ${item.tname}</span>
            <span>⏱ ${timeStr} (${timeAgo(item.pubdate)})</span>
          </div>
          <div class="stats-row">
            <span class="stat">👍 <span class="val">${formatNum(item.like)}</span></span>
            <span class="stat">▶️ <span class="val">${formatNum(item.view)}</span></span>
            <span class="stat">🪙 <span class="val">${formatNum(item.coin)}</span></span>
            <span class="stat">⭐ <span class="val">${formatNum(item.favorite)}</span></span>
            <span class="stat">💬 <span class="val">${formatNum(item.danmaku)}</span></span>
          </div>
          ${tags ? `<div class="reason">${tags}</div>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderTable(list, start=1, extraCols=[]) {
  const cols = ['#', '标题', 'UP主', '分区', '点赞', '播放', '投币', '收藏', '弹幕', '发布时间'];
  cols.push(...extraCols);
  const rows = list.map((item, i) => {
    const ri = start + i;
    const pub = new Date(item.pubdate * 1000);
    const timeStr = pub.toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
    const tags = getTag(item);
    let extra = '';
    if (extraCols.includes('互动率')) extra = `<td class="num-cell">${item.engagement_rate || '-'}%</td>`;
    if (extraCols.includes('互动总计')) extra = `<td class="num-cell">${formatNum(item.total_interaction || 0)}</td>`;
    return `<tr onclick="window.open('${item.link}','_blank')" style="cursor:pointer;">
      <td><span class="rank ${getRankClass(i)}" style="display:inline-block;width:22px;height:22px;line-height:22px;font-size:11px;">${ri}</span></td>
      <td class="cell-title" title="${item.title.replace(/"/g,'&quot;')}">${item.title} ${tags}</td>
      <td class="cell-author">${item.author}</td>
      <td>${item.tname}</td>
      <td class="num-cell">${formatNum(item.like)}</td>
      <td class="num-cell">${formatNum(item.view)}</td>
      <td class="num-cell">${formatNum(item.coin)}</td>
      <td class="num-cell">${formatNum(item.favorite)}</td>
      <td class="num-cell">${formatNum(item.danmaku)}</td>
      <td style="color:#666;font-size:12px;">${timeStr}<br>${timeAgo(item.pubdate)}</td>
      ${extra}
    </tr>`;
  }).join('');
  return `<table class="data-table"><thead><tr>
    <th>#</th><th>标题</th><th>UP主</th><th>分区</th><th>点赞</th><th>播放</th><th>投币</th><th>收藏</th><th>弹幕</th><th>发布时间</th>
    ${extraCols.map(c => `<th>${c}</th>`).join('')}
  </tr></thead><tbody>${rows}</tbody></table>`;
}

function renderDistribution(dist) {
  const labels = dist.map(d => d.name);
  const counts = dist.map(d => d.count);
  const colors = ['#fb7299','#00a1d6','#facc15','#4ade80','#818cf8','#f87171','#34d399','#a78bfa','#fbbf24','#f472b6'];
  return `<div class="chart-container">
    <h3>📊 分区热门内容分布（共 ${dist.reduce((a,d)=>a+d.count,0)} 条）</h3>
    <div class="chart-wrap"><canvas id="distChart"></canvas></div>
    <div style="margin-top:16px;display:flex;flex-wrap:wrap;gap:8px;">
      ${dist.map((d,i) => `<span style="font-size:13px;color:#999;"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${colors[i%colors.length]};margin-right:4px;"></span>${d.name} <b style="color:#ddd;">${d.count}</b></span>`).join('')}
    </div>
  </div>`;
}

function setViewMode(tabId, mode) {
  localStorage.setItem('view-' + tabId, mode);
  showView(tabId, mode);
}

function showView(tabId, viewMode='card') {
  if (!currentData) return;
  const el = document.getElementById('tab-' + tabId);
  if (!el) return;
  let html = '';

  if (tabId === 'hot') {
    const data = currentData.hot;
    const cardActive = viewMode === 'card' ? 'active' : '';
    const tableActive = viewMode === 'table' ? 'active' : '';
    html = `<div class="view-switch"><button class="${cardActive}" onclick="setViewMode('hot','card')">卡片</button><button class="${tableActive}" onclick="setViewMode('hot','table')">表格</button></div>`;
    if (viewMode === 'card') {
      html += `<div class="video-grid">${renderCards(data, 1)}</div>`;
    } else {
      html += renderTable(data, 1);
    }
  } else if (tabId === 'soaring') {
    const soar = currentData.soaring.concat(currentData.potential_soaring);
    const unique = [];
    const seen = new Set();
    for (const item of soar) {
      if (!seen.has(item.aid)) { seen.add(item.aid); unique.push(item); }
    }
    const soCardActive = viewMode === 'card' ? 'active' : '';
    const soTableActive = viewMode === 'table' ? 'active' : '';
    html = `<div class="view-switch"><button class="${soCardActive}" onclick="setViewMode('soaring','card')">卡片</button><button class="${soTableActive}" onclick="setViewMode('soaring','table')">表格</button></div>`;
    html += '<p style="color:#888;font-size:13px;margin-bottom:12px;">⚡ 包含直接标注"飙升"的内容 + 近72h高互动率潜在飙升内容</p>';
    if (viewMode === 'card') {
      html += `<div class="video-grid">${renderCards(unique, 1)}</div>`;
    } else {
      html += renderTable(unique, 1, ['互动率']);
    }
  } else if (tabId === 'new') {
    const data = currentData.new_hot;
    const nCardActive = viewMode === 'card' ? 'active' : '';
    const nTableActive = viewMode === 'table' ? 'active' : '';
    html = `<div class="view-switch"><button class="${nCardActive}" onclick="setViewMode('new','card')">卡片</button><button class="${nTableActive}" onclick="setViewMode('new','table')">表格</button></div>`;
    html += '<p style="color:#888;font-size:13px;margin-bottom:12px;">⏰ 近24小时内发布，按互动总量排序</p>';
    if (viewMode === 'card') {
      html += `<div class="video-grid">${renderCards(data, 1)}</div>`;
    } else {
      html += renderTable(data, 1, ['互动总计']);
    }
  } else if (tabId === 'distribution') {
    html = renderDistribution(currentData.distribution);
  } else if (tabId === 'insights') {
    if (!insightsData) {
      html = '<div class="loading" style="display:block;"><div class="spinner"></div><div>正在生成热点解读...</div></div>';
      fetchInsights().then(d => {
        const el = document.getElementById('tab-insights');
        if (el) el.innerHTML = renderInsights(d);
      }).catch(e => {
        const el = document.getElementById('tab-insights');
        if (el) el.innerHTML = `<div class="error-msg"><div class="icon">⚠️</div><div>加载失败: ${e.message}</div></div>`;
      });
    } else {
      html = renderInsights(insightsData);
    }
  }
  if (html) el.innerHTML = html;

  if (tabId === 'distribution' && currentData.distribution.length) {
    setTimeout(() => renderChart(currentData.distribution), 100);
  }
}

function renderChart(dist) {
  const canvas = document.getElementById('distChart');
  if (!canvas) return;
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  const ctx = canvas.getContext('2d');
  const parent = canvas.parentElement;
  canvas.width = parent.clientWidth * window.devicePixelRatio;
  canvas.height = parent.clientHeight * window.devicePixelRatio;
  canvas.style.width = parent.clientWidth + 'px';
  canvas.style.height = parent.clientHeight + 'px';
  const labels = dist.map(d => d.name);
  const counts = dist.map(d => d.count);
  const colors = ['#fb7299','#00a1d6','#facc15','#4ade80','#818cf8','#f87171','#34d399','#a78bfa','#fbbf24','#f472b6','#2dd4bf','#e879f9','#f97316','#a3e635','#38bdf8'];
  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: '视频数量',
        data: counts,
        backgroundColor: colors.slice(0, labels.length).map(c => c + '99'),
        borderColor: colors.slice(0, labels.length),
        borderWidth: 1,
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { backgroundColor: '#1a1a2e', titleColor: '#eee', bodyColor: '#ccc' }
      },
      scales: {
        x: { ticks: { color: '#888' }, grid: { color: 'rgba(255,255,255,0.04)' } },
        y: { ticks: { color: '#888', stepSize: 1 }, grid: { color: 'rgba(255,255,255,0.04)' }, beginAtZero: true },
      }
    }
  });
}

function updateStats(data) {
  document.getElementById('total-count').textContent = data.total;
  document.getElementById('hot-count').textContent = data.hot.length;
  const soar = data.soaring.concat(data.potential_soaring);
  const unique = [];
  const seen = new Set();
  for (const item of soar) { if (!seen.has(item.aid)) { seen.add(item.aid); unique.push(item); } }
  document.getElementById('soar-count').textContent = unique.length;
  document.getElementById('soar-badge').textContent = data.soaring.length;
  document.getElementById('new-count').textContent = data.new_hot.length;
  document.getElementById('cat-count').textContent = data.distribution.length;
  const t = new Date(data.fetch_time * 1000);
  document.getElementById('update-time').textContent =
    t.toLocaleString('zh-CN', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

// ===== 热点解读 =====
let insightsData = null;

function formatDuration(sec) {
  if (!sec) return '-';
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return m > 0 ? `${m}分${s}秒` : `${s}秒`;
}

function renderInsights(data) {
  const list = data.hot_insights || [];
  const cats = data.cat_insights || [];
  const timeDist = data.time_distribution || [];

  let html = '<div style="margin-bottom:16px;">';

  // Summary cards
  const avgEng = list.length ? list.reduce((s, v) => s + v.engagement_score, 0) / list.length : 0;
  const avgLike = list.length ? list.reduce((s, v) => s + v.like_rate, 0) / list.length : 0;

  html += `<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;">
    <div class="stat-item" style="background:rgba(251,114,153,0.1);padding:12px 18px;border-radius:10px;border:1px solid rgba(251,114,153,0.2);">
      📊 分析视频 <span class="num">${data.total_analyzed}</span> 条
    </div>
    <div class="stat-item" style="background:rgba(0,161,214,0.1);padding:12px 18px;border-radius:10px;border:1px solid rgba(0,161,214,0.2);">
      💡 平均互动评分 <span class="num">${avgEng.toFixed(1)}</span>
    </div>
    <div class="stat-item" style="background:rgba(250,204,21,0.1);padding:12px 18px;border-radius:10px;border:1px solid rgba(250,204,21,0.2);">
      👍 平均点赞率 <span class="num">${avgLike.toFixed(1)}%</span>
    </div>
  </div>`;

  // Time distribution bar
  html += '<div class="chart-container"><h3>⏰ 热门视频发布时间分布</h3><div style="display:flex;gap:6px;align-items:end;height:120px;padding:10px 0;">';
  const maxCount = Math.max(...timeDist.map(d => d.count), 1);
  const colors = ['#f87171','#fb923c','#facc15','#4ade80','#38bdf8','#818cf8','#e879f9'];
  timeDist.forEach((d, i) => {
    const h = (d.count / maxCount) * 100;
    html += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;">
      <div style="font-size:11px;color:#999;margin-bottom:4px;">${d.count}</div>
      <div style="width:100%;height:${h}px;background:${colors[i]};border-radius:4px 4px 0 0;min-height:4px;transition:height 0.3s;"></div>
      <div style="font-size:11px;color:#888;margin-top:4px;">${d.bucket}</div>
    </div>`;
  });
  html += '</div></div>';

  // Category insights table
  html += '<div class="chart-container" style="margin-top:12px;"><h3>📂 分区热点洞察</h3>';
  html += '<table class="data-table"><thead><tr><th>分区</th><th>视频数</th><th>总播放</th><th>平均点赞率</th><th>投币/点赞比</th><th>运营建议</th></tr></thead><tbody>';
  cats.slice(0, 12).forEach(c => {
    let tip = '';
    if (c.avg_like_rate > 10) tip = '🔥 高互动分区，适合情感/共鸣向内容';
    else if (c.avg_like_rate > 6) tip = '👍 互动良好，建议保持更新频率';
    else tip = '📈 竞争激烈，需差异化切入';
    if (c.avg_coin_rate > 20) tip += '，用户愿意投币推荐';
    html += `<tr>
      <td><b>${c.name}</b></td>
      <td class="num-cell">${c.count}</td>
      <td class="num-cell">${formatNum(c.total_view)}</td>
      <td class="num-cell" style="color:${c.avg_like_rate > 8 ? '#4ade80' : '#facc15'}">${c.avg_like_rate}%</td>
      <td class="num-cell" style="color:${c.avg_coin_rate > 15 ? '#4ade80' : '#facc15'}">${c.avg_coin_rate}%</td>
      <td style="color:#999;font-size:12px;">${tip}</td>
    </tr>`;
  });
  html += '</tbody></table></div>';

  // Per-video deep insights
  html += '<h3 style="margin:20px 0 12px;font-size:16px;">🔍 高热视频多角度解读</h3>';
  list.forEach((v, i) => {
    const pub = new Date(v.pubdate * 1000);
    const timeStr = pub.toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
    const hotColor = v.hot_score > 5000 ? '#fb7299' : v.hot_score > 2000 ? '#facc15' : '#38bdf8';
    const engColor = v.engagement_score > 15 ? '#4ade80' : v.engagement_score > 8 ? '#facc15' : '#f87171';

    html += `<div class="video-card" style="margin-bottom:10px;cursor:default;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;">
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
            <span class="rank ${getRankClass(i)}" style="flex-shrink:0;">${i+1}</span>
            <span class="title" style="margin-bottom:0;flex:1;" onclick="window.open('${v.link}','_blank')">${v.title}</span>
          </div>
          <div class="meta">
            <span class="author">👤 ${v.author}</span>
            <span>🏷️ ${v.tname}</span>
            <span>⏱ ${timeStr}</span>
            <span>📐 ${formatDuration(v.duration)}</span>
          </div>
          <div class="stats-row" style="margin-top:4px;">
            <span class="stat">🔥 热度 <span class="val">${v.hot_score}</span></span>
            <span class="stat">💡 互动评分 <span class="val">${v.engagement_score}</span></span>
            <span class="stat">👍 点赞率 <span class="val">${v.like_rate}%</span></span>
            <span class="stat">🪙 投币/赞 <span class="val">${v.coin_rate}%</span></span>
            <span class="stat">📣 分享率 <span class="val">${v.share_rate}%</span></span>
            <span class="stat">⭐ 收藏率 <span class="val">${v.fav_rate}%</span></span>
          </div>
          <div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px;">
            ${v.tags.map(t => `<span class="tag tag-soar">${t}</span>`).join('')}
          </div>
        </div>
      </div>
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.06);">
        <div style="font-size:12px;color:#aaa;margin-bottom:6px;">📌 多角度解读：</div>
        ${v.angles.map(a => `<div style="font-size:13px;color:#ddd;padding:3px 0;padding-left:12px;border-left:2px solid ${a.includes('🔥')?'#fb7299':a.includes('💰')||a.includes('📚')?'#facc15':a.includes('📣')||a.includes('🔄')?'#4ade80':a.includes('💬')||a.includes('🗣️')?'#38bdf8':a.includes('⭐')?'#818cf8':'#666'};margin-bottom:4px;">${a}</div>`).join('')}
      </div>
    </div>`;
  });

  html += '</div>';
  return html;
}

async function fetchInsights() {
  try {
    const resp = await fetch('/api/insights');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    insightsData = await resp.json();
    return insightsData;
  } catch (e) {
    throw e;
  }
}

async function refresh() {
  let loading = document.getElementById('loading');
  const content = document.getElementById('content');
  const statusText = document.getElementById('status-text');
  const refreshBtn = document.querySelector('.header-right button');

  if (!loading) {
    loading = document.createElement('div');
    loading.className = 'loading';
    loading.id = 'loading';
    loading.innerHTML = '<div class="spinner"></div><div>正在抓取 B站 综合热门数据（3页150条）...</div>';
    content.parentNode.insertBefore(loading, content);
  }
  loading.style.display = 'block';
  content.innerHTML = '';
  statusText.textContent = '加载中...';
  refreshBtn.disabled = true;

  try {
    const resp = await fetch('/api/analysis');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    currentData = await resp.json();
    insightsData = null;

    loading.style.display = 'none';
    statusText.textContent = '就绪';
    refreshBtn.disabled = false;

    updateStats(currentData);

    const tabs = ['hot', 'soaring', 'new', 'distribution', 'insights'];
    let html = '';
    tabs.forEach(id => {
      html += `<div class="tab-content ${id === 'hot' ? 'active' : ''}" id="tab-${id}"></div>`;
    });
    content.innerHTML = html;

    showView('hot', 'card');
  } catch (e) {
    loading.style.display = 'none';
    statusText.textContent = '错误';
    refreshBtn.disabled = false;
    content.innerHTML = `<div class="error-msg"><div class="icon">⚠️</div><div>加载失败: ${e.message}</div><button onclick="refresh()" style="margin-top:12px;padding:8px 20px;border:1px solid rgba(255,255,255,0.1);border-radius:8px;background:transparent;color:#ccc;cursor:pointer;">重试</button></div>`;
  }
}

// Tab switching
document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  const target = document.getElementById('tab-' + tab.dataset.tab);
  if (target) {
    target.classList.add('active');
    if (!target.hasChildNodes() || !target.querySelector('.video-card,.data-table,.chart-container')) {
      const mode = localStorage.getItem('view-' + tab.dataset.tab) || 'card';
      showView(tab.dataset.tab, mode);
    }
  }
  if (tab.dataset.tab === 'distribution') {
    setTimeout(() => renderChart(currentData.distribution), 100);
  }
});

// Initial load
refresh();
</script>
</body>
</html>
